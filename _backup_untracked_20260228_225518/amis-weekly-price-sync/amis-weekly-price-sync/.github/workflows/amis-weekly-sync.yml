name: AMIS Weekly Product Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 2,5"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SOURCE_VEG_URL: https://amis.afa.gov.tw/veg/VegProdDayTransInfo.aspx
      SOURCE_FRUIT_URL: https://amis.afa.gov.tw/fruit/FruitProdDayTransInfo.aspx
      MARKET_NO: "109"
      MARKET_NAME: 台北一
      TIMEZONE: Asia/Taipei
      WORKSHEET_SKIP: Setting,(空白模板_水果),(空白模板_蔬菜)
      GOOGLE_SHEET_ID: ${{ secrets.AMIS_WEEKLY_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Sync AMIS data
        run: python sync_amis_weekly.py
