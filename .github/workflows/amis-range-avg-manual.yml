name: 上價平均（區間）

on:
  workflow_dispatch:

jobs:
  run:
    name: 計算上價平均並寫入試算表
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行上價平均腳本
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID_RANGE_AVG }}
          GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
        run: |
          if [ -z "$GOOGLE_SHEET_ID" ]; then
            echo "Missing secret GOOGLE_SHEET_ID_RANGE_AVG";
            exit 1;
          fi
          python amis_range_avg_to_sheet.py
