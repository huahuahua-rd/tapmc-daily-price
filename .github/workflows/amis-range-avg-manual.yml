name: 上價平均（區間）

on:
  workflow_dispatch:

jobs:
  run:
    name: 計算上價平均並寫入試算表
    runs-on: [self-hosted, macOS]
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝依賴
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: 執行上價平均腳本
        env:
          GOOGLE_SHEET_ID_RANGE_AVG: ${{ secrets.GOOGLE_SHEET_ID_RANGE_AVG }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
          FORCE_IPV4: "true"
          REQUEST_TIMEOUT: "120"
        run: |
          if [ -z "$GOOGLE_SHEET_ID_RANGE_AVG" ] && [ -z "$GOOGLE_SHEET_ID" ]; then
            echo "Missing secret GOOGLE_SHEET_ID_RANGE_AVG or GOOGLE_SHEET_ID";
            exit 1;
          fi
          export GOOGLE_SHEET_ID="${GOOGLE_SHEET_ID_RANGE_AVG:-$GOOGLE_SHEET_ID}"
          python3 amis_range_avg_to_sheet.py
