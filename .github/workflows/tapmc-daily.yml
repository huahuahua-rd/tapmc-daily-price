name: TAPMC Daily Price

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:



jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SOURCE_URL: https://www.tapmc.com.tw/Pages/Trans/Price1
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
      ITEM_WORKSHEET_NAME: item
      PRICE_WORKSHEET_NAME: 價格
      ITEM_COLUMN: "1"
      TIMEZONE: Asia/Taipei
      QUERY_COMBOS: 1:V:1,1:F:1,2:V:1,2:V:2,2:F:1,2:F:2
      QUERY_DATE_ROC: ""
      MAX_BACKTRACK_DAYS: "10"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python fetch_tapmc_to_sheet.py
