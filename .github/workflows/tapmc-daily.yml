name: TAPMC Schedule V2

on:
  workflow_dispatch:
    inputs:
      delay_seconds:
        description: "Seconds before auto-dispatching the next run"
        required: false
        default: "300"
  schedule:
    - cron: "2-59/5 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tapmc-daily.yml"

permissions:
  contents: read
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SOURCE_URL: https://www.tapmc.com.tw/Pages/Trans/Price1
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
      ITEM_WORKSHEET_NAME: item
      PRICE_WORKSHEET_NAME: 價格
      ITEM_COLUMN: "1"
      TIMEZONE: Asia/Taipei
      QUERY_COMBOS: 1:V:1,1:F:1,2:V:1,2:V:2,2:F:1,2:F:2
      QUERY_DATE_