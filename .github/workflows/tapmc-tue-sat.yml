name: 二六更新行情

on:
  schedule:
    # UTC 01:00 = Asia/Taipei 09:00 (Tue, Sat)
    - cron: "0 1 * * 2,6"
  workflow_dispatch:

jobs:
  run:
    name: 更新品項價格（二六）
    runs-on: ubuntu-latest
    env:
      SOURCE_VEG_URL: https://amis.afa.gov.tw/veg/VegProdDayTransInfo.aspx
      SOURCE_FRUIT_URL: https://amis.afa.gov.tw/fruit/FruitProdDayTransInfo.aspx
      SOURCE_VEG_SELECTOR_URL: https://amis.afa.gov.tw/Selector/VegProductSelector.aspx?textField=ctl00_contentPlaceHolder_txtProduct&valueField=ctl00_contentPlaceHolder_hfldProductNo&productTypeField=ctl00_contentPlaceHolder_hfldProductType
      SOURCE_FRUIT_SELECTOR_URL: https://amis.afa.gov.tw/Selector/FruitProductSelector.aspx?textField=ctl00_contentPlaceHolder_txtProduct&valueField=ctl00_contentPlaceHolder_hfldProductNo&productTypeField=ctl00_contentPlaceHolder_hfldProductType
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID_TUE_SAT }}
      GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
      ITEM_WORKSHEET_NAME: item
      ITEM_TAB_COLUMN: "3"
      ITEM_CODE_COLUMN: "4"
      ITEM_ENABLE_COLUMN: "1"
      TIMEZONE: Asia/Taipei
      MARKET_NO: "109"
      MARKET_NAME: "北市一"
      MAX_BACKTRACK_DAYS: "60"
      MAX_DAYS_PER_RUN: "0"
      DATE_FORMAT: "ROC"
      ALLOW_CREATE_TABS: "true"
      ALLOW_NO_DATA: "true"
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝依賴
        run: pip install -r requirements.txt

      - name: 執行同步
        run: python amis_daily_to_sheet.py
