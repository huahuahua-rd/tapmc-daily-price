name: 二六更新行情

on:
  schedule:
    # UTC 01:00 = Asia/Taipei 09:00 (Tue, Sat)
    - cron: "0 1 * * 2,6"
  workflow_dispatch:

jobs:
  run:
    name: 更新品項價格（二六）
    runs-on: ubuntu-latest
    env:
      SOURCE_URL: https://www.tapmc.com.tw/Pages/Trans/Price1
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID_TUE_SAT }}
      GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
      ITEM_WORKSHEET_NAME: item
      ITEM_TAB_COLUMN: "3"
      ITEM_CODE_COLUMN: "4"
      ITEM_ENABLE_COLUMN: "1"
      PRICE_WORKSHEET_NAME: 價格
      ITEM_COLUMN: "1"
      TIMEZONE: Asia/Taipei
      QUERY_COMBOS: 1:V:1,1:F:1,2:V:1,2:V:2,2:F:1,2:F:2
      QUERY_DATE_ROC: ""
      MAX_BACKTRACK_DAYS: "60"
      ALLOW_NO_DATA: "true"
      AUTO_ITEM_COLUMN: "true"
      ITEM_COLUMN_CANDIDATES: "1,2,3,4,5"
      DATE_FORMAT: "ROC"
      REQUIRE_EXISTING_TABS: "true"
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝依賴
        run: pip install -r requirements.txt

      - name: 執行同步
        run: python fetch_tapmc_to_sheet.py
